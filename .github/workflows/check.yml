name: Check Notice

on:
  schedule:
    # 깃허브 사용량을 아끼기 위해 실행 주기를 1시간(60분)으로 조정합니다.
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 파일 저장 권한 필수

    steps:
      - name: Checkout repository
        # Node.js 24 경고를 해결하기 위해 최신 v4로 업데이트했습니다.
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install axios
        run: npm install axios

      - name: Run script
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          # 파일이 없으면 기본 구조 생성
          if [ ! -f last_ids.json ]; then echo '{"notice":[]}' > last_ids.json; fi
          node index.js

      - name: Save Last IDs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # 특정 파일만 정확하게 추적하도록 설정
          git add last_ids.json
          # 수정사항이 있을 때만 커밋 및 푸시
          if git diff --cached --quiet; then
            echo "변경사항이 없어 종료합니다."
          else
            git commit -m "Update notice history"
            git push origin main
          fi
