name: Check Notice
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install axios
        run: npm install axios

      - name: Run script
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ ! -f last_id.txt ]; then echo "0" > last_id.txt; fi
          node index.js

      - name: Force Push ID
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add last_id.txt
          
          # 변경사항이 있는지 확인하고, 있을 때만 커밋/푸시합니다.
          if [ -n "$(git status --porcelain last_id.txt)" ]; then
            git commit -m "Update last notice ID"
            git push --force origin main
          else
            echo "변경 사항이 없으므로 작업을 마칩니다."
          fi
