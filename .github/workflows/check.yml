name: Check Notice
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install axios
        run: npm install axios

      - name: Run script
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ ! -f last_id.txt ]; then echo "0" > last_id.txt; fi
          node index.js

      - name: Force Sync and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 서버의 최신 상태를 먼저 가져와서 합칩니다 (충돌 방지)
          git pull origin main --rebase
          
          git add last_id.txt
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update last notice ID"
            # 강제로 main 브랜치에 밀어넣습니다.
            git push origin main
          else
            echo "No changes to commit"
          fi
