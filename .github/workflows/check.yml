name: Check Notice
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install axios
        run: npm install axios

      - name: Run script
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ ! -f last_id.txt ]; then echo "0" > last_id.txt; fi
          node index.js

      - name: Force Push ID
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add last_id.txt
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update last notice ID"
            # --force 옵션을 사용하여 충돌을 무시하고 강제로 저장합니다.
            git push --force origin main
          else
            echo "No changes to commit"
          fi
