name: Check Notice
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install axios
        run: npm install axios

      - name: Run script
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ ! -f last_ids.json ]; then echo '{"notice":[]}' > last_ids.json; fi
          node index.js

      - name: Save Last IDs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add last_ids.json
          # 변경사항이 있을 때만 커밋 및 푸시하여 에러 방지
          if [ -n "$(git status --porcelain last_ids.json)" ]; then
            git commit -m "Update last notice IDs"
            git push origin main
          else
            echo "No changes to commit"
          fi
